name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            export PATH=$PATH:/usr/local/go/bin
            cd /opt/serverpanel

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Building backend ==="
            cd /opt/serverpanel/backend
            go mod tidy
            CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o /opt/serverpanel/bin/server ./cmd/server
            CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o /opt/serverpanel/bin/agent ./cmd/agent
            CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o /opt/serverpanel/bin/seed ./cmd/seed

            echo "=== Building frontend ==="
            cd /opt/serverpanel/frontend
            npm install
            npx turbo run build

            echo "=== Updating nginx WebSocket config ==="
            if ! grep -q 'location /ws/' /etc/nginx/sites-available/serverpanel 2>/dev/null; then
              python3 -c "
            f='/etc/nginx/sites-available/serverpanel'
            ws_block='''
                location /ws/ {
                    proxy_pass http://127.0.0.1:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \\\$http_upgrade;
                    proxy_set_header Connection \"upgrade\";
                    proxy_set_header Host \\\$host;
                    proxy_read_timeout 3600s;
                    proxy_send_timeout 3600s;
                }
            '''
            with open(f) as fh: c=fh.read()
            c=c.replace('location / {', ws_block.strip()+'\\n\\n    location / {', 1)
            with open(f,'w') as fh: fh.write(c)
            "
              nginx -t && systemctl reload nginx
              echo "Nginx WebSocket config added"
            else
              echo "Nginx WebSocket config already present"
            fi

            echo "=== Restarting services ==="
            systemctl restart serverpanel
            systemctl restart serverpanel-agent

            echo "=== Health check ==="
            sleep 3
            curl -sf http://127.0.0.1:8080/api/v1/health || echo "WARNING: health check failed"

            echo "=== Deploy complete ==="
